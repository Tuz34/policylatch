name: PolicyLatch permission check
description: Evaluate an MCP call, manifest, or proposed agent action against a local policy.
author: PolicyLatch contributors

branding:
  icon: shield
  color: blue

inputs:
  command:
    description: Run check, scan, gateway-check, or gateway-replay.
    required: false
    default: check
  input-file:
    description: Path to the action, manifest, MCP tools/call JSON, or synthetic JSONL trace.
    required: true
  policy-file:
    description: Path to the local PolicyLatch YAML policy.
    required: true
  format:
    description: "Report format: json, markdown, html, or sarif."
    required: false
    default: json
  output-file:
    description: Path where the generated report will be written.
    required: false
    default: policylatch-report.json
  fail-on:
    description: "Decision threshold that fails the step: never, warn, or deny."
    required: false
    default: deny
  python-version:
    description: Python version used to run PolicyLatch.
    required: false
    default: "3.12"

outputs:
  exit-code:
    description: "PolicyLatch exit code: 0 allow, 1 warn, 2 deny, 3 input/config error."
    value: ${{ steps.guard.outputs.exit-code }}
  decision:
    description: Normalized allow, warn, deny, or error outcome.
    value: ${{ steps.guard.outputs.decision }}
  report-path:
    description: Report path supplied through output-file.
    value: ${{ steps.guard.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install PolicyLatch from this action
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Evaluate policy
      id: guard
      shell: bash
      env:
        POLICYLATCH_COMMAND: ${{ inputs.command }}
        POLICYLATCH_INPUT: ${{ inputs.input-file }}
        POLICYLATCH_POLICY: ${{ inputs.policy-file }}
        POLICYLATCH_FORMAT: ${{ inputs.format }}
        POLICYLATCH_OUTPUT: ${{ inputs.output-file }}
        POLICYLATCH_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        case "$POLICYLATCH_COMMAND" in
          check) input_flag="--action" ;;
          scan) input_flag="--mcp-config" ;;
          gateway-check) input_flag="--request" ;;
          gateway-replay) input_flag="--input" ;;
          *) echo "PolicyLatch action: unsupported command." >&2; exit 3 ;;
        esac
        case "$POLICYLATCH_FORMAT" in
          json|markdown|html|sarif) ;;
          *) echo "PolicyLatch action: format must be json, markdown, html, or sarif." >&2; exit 3 ;;
        esac
        case "$POLICYLATCH_FAIL_ON" in
          never|warn|deny) ;;
          *) echo "PolicyLatch action: fail-on must be never, warn, or deny." >&2; exit 3 ;;
        esac

        mkdir -p "$(dirname "$POLICYLATCH_OUTPUT")"
        set +e
        python -m policylatch "$POLICYLATCH_COMMAND" \
          "$input_flag" "$POLICYLATCH_INPUT" \
          --policy "$POLICYLATCH_POLICY" \
          --format "$POLICYLATCH_FORMAT" \
          --output "$POLICYLATCH_OUTPUT"
        code=$?
        set -e

        case "$code" in
          0) decision="allow" ;;
          1) decision="warn" ;;
          2) decision="deny" ;;
          *) decision="error" ;;
        esac
        echo "exit-code=$code" >> "$GITHUB_OUTPUT"
        echo "decision=$decision" >> "$GITHUB_OUTPUT"
        echo "report-path=$POLICYLATCH_OUTPUT" >> "$GITHUB_OUTPUT"

        if [ "$code" -ge 3 ]; then
          exit "$code"
        fi
        if [ "$POLICYLATCH_FAIL_ON" = "warn" ] && [ "$code" -ge 1 ]; then
          exit "$code"
        fi
        if [ "$POLICYLATCH_FAIL_ON" = "deny" ] && [ "$code" -eq 2 ]; then
          exit "$code"
        fi
        exit 0

name: test
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  action-smoke:
    name: reusable action smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Evaluate a synthetic safe action
        id: guard
        uses: ./
        with:
          command: check
          input-file: examples/actions/safe-file-read.json
          policy-file: examples/policies/balanced.yaml
          output-file: artifacts/action-smoke.json
          fail-on: deny
      - name: Verify action outputs
        shell: bash
        run: |
          test "${{ steps.guard.outputs.exit-code }}" = "0"
          test "${{ steps.guard.outputs.decision }}" = "allow"
          test -f "${{ steps.guard.outputs.report-path }}"
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - name: Read-only Windows integration checks
        if: runner.os == 'Windows'
        env:
          POLICYLATCH_WINDOWS_INTEGRATION: "1"
        run: pytest tests/test_windows_integration.py
      - run: ruff check .
      - run: ruff format --check .
